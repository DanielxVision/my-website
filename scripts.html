<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>More Scripts</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2 class="logo">DANIEL</h2>
<ul>
<li><a href="index.html">Home</a></li>
</ul>
</nav>

<section class="section">

<h2>All Roblox Scripts</h2>

<div class="cards">

<div class="card">
<h3>Speed Script</h3>
<p>Increase player speed.</p>
<button onclick="copyText(`-- Speed Script
local player = game.Players.LocalPlayer

player.CharacterAdded:Connect(function(char)
local humanoid = char:WaitForChild("Humanoid")
humanoid.WalkSpeed = 50
end)

if player.Character then
player.Character.Humanoid.WalkSpeed = 50
end
`, 'Speed Script')">Copy</button>
</div>

<div class="card">
<h3>Infinite Jump</h3>
<p>Jump unlimited times.</p>
<button onclick="copyText(`-- Infinite Jump Script
local UserInputService = game:GetService("UserInputService")
local player = game.Players.LocalPlayer

UserInputService.JumpRequest:Connect(function()
local character = player.Character
if character then
local humanoid = character:FindFirstChildOfClass("Humanoid")
if humanoid then
humanoid:ChangeState(Enum.HumanoidStateType.Jumping)
end
end
end)
`, 'Infinite Jump')">Copy</button>
</div>

<div class="card">
<h3>Fly Script</h3>
<p>Simple fly system.</p>
<button onclick="copyText(`-- Fly Script
local player = game.Players.LocalPlayer
local mouse = player:GetMouse()

local flying = false
local speed = 50

mouse.KeyDown:Connect(function(key)
if key == "f" then
flying = not flying

if flying then
local bodyVelocity = Instance.new("BodyVelocity")
bodyVelocity.MaxForce = Vector3.new(1e5,1e5,1e5)
bodyVelocity.Velocity = Vector3.new(0,0,0)
bodyVelocity.Parent = player.Character.HumanoidRootPart

while flying do
wait()
bodyVelocity.Velocity = workspace.CurrentCamera.CFrame.LookVector * speed
end

bodyVelocity:Destroy()
end
end
end)
`, 'Fly Script')">Copy</button>
</div>

</div>

</section>

<script>
function copyText(text, name){
navigator.clipboard.writeText(text);

let msg = document.createElement("div");
msg.innerText = name + " copied!";
msg.style.position = "fixed";
msg.style.bottom = "30px";
msg.style.left = "50%";
msg.style.transform = "translateX(-50%)";
msg.style.background = "black";
msg.style.padding = "10px 20px";
msg.style.borderRadius = "20px";

document.body.appendChild(msg);
setTimeout(()=> msg.remove(), 2000);
}
</script>

</body>
</html>
