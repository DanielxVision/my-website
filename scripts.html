<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>More Scripts</title>
<link rel="stylesheet" href="style.css">

<style>
/* POPUP STYLE */
.script-viewer{
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.script-box{
background:#111;
padding:20px;
border-radius:10px;
width:80%;
max-width:700px;
}

.script-box pre{
background:black;
padding:15px;
border-radius:8px;
overflow:auto;
max-height:300px;
color:white;
}

.script-box button{
margin-top:10px;
margin-right:10px;
}
</style>

</head>

<body>

<nav>
<h2 class="logo">DANIEL</h2>
<ul>
<li><a href="index.html">Home</a></li>
</ul>
</nav>

<section class="section">

<h2>All Roblox Scripts</h2>

<div class="cards">

<div class="card">
<h3>Speed Script</h3>
<p>Increase player speed.</p>
<button onclick="openScript('speed')">Get Script</button>
</div>

<div class="card">
<h3>Infinite Jump</h3>
<p>Jump unlimited times.</p>
<button onclick="openScript('jump')">Get Script</button>
</div>

<div class="card">
<h3>Fly Script</h3>
<p>Simple fly system.</p>
<button onclick="openScript('fly')">Get Script</button>
</div>

</div>

</section>

<!-- POPUP -->
<div class="script-viewer" id="viewer">
<div class="script-box">

<pre id="scriptText"></pre>

<button onclick="copyScript()">Copy</button>
<button onclick="closeViewer()">Close</button>

</div>
</div>

<script>
const scripts = {

speed: `-- Speed Script
local player = game.Players.LocalPlayer

player.CharacterAdded:Connect(function(char)
local humanoid = char:WaitForChild("Humanoid")
humanoid.WalkSpeed = 50
end)

if player.Character then
player.Character.Humanoid.WalkSpeed = 50
end`,

jump: `-- Infinite Jump Script
local UserInputService = game:GetService("UserInputService")
local player = game.Players.LocalPlayer

UserInputService.JumpRequest:Connect(function()
local character = player.Character
if character then
local humanoid = character:FindFirstChildOfClass("Humanoid")
if humanoid then
humanoid:ChangeState(Enum.HumanoidStateType.Jumping)
end
end
end)`,

fly: `-- Fly Script
local player = game.Players.LocalPlayer
local mouse = player:GetMouse()

local flying = false
local speed = 50

mouse.KeyDown:Connect(function(key)
if key == "f" then
flying = not flying

if flying then
local bodyVelocity = Instance.new("BodyVelocity")
bodyVelocity.MaxForce = Vector3.new(1e5,1e5,1e5)
bodyVelocity.Velocity = Vector3.new(0,0,0)
bodyVelocity.Parent = player.Character.HumanoidRootPart

while flying do
wait()
bodyVelocity.Velocity = workspace.CurrentCamera.CFrame.LookVector * speed
end

bodyVelocity:Destroy()
end
end
end)`
};

function openScript(id){
document.getElementById("viewer").style.display = "flex";
document.getElementById("scriptText").innerText = scripts[id];
}

function closeViewer(){
document.getElementById("viewer").style.display = "none";
}

function copyScript(){
let text = document.getElementById("scriptText").innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}
</script>

</body>
</html>
