<div class="cards">

<div class="card">
<h3>Speed Script</h3>
<p>Increase player speed.</p>

</div>

<div class="card">

<button onclick="copyText('local UIS = game:GetService(\"UserInputService\") ...')">Copy</button>
</div>

<script>
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied!");
}
</script>
